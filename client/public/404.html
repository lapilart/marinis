<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Marini Associates</title>
    <script>
      // GitHub Pages SPA routing: save current path and redirect to root
      // so the React app can handle the route client-side.
      sessionStorage.redirect = location.href;
      var base = location.pathname.split("/").slice(0, 2).join("/");
      location.replace(base + "/");
    </script>
  </head>
  <body></body>
</html>
